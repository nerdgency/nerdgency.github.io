title: Nerdgency Docs
description: Documentation for ExpressionEngine addons built by Nerdgency.
url: "https://nerdgency.github.io"
baseurl: ""

theme: just-the-docs

# --- Just the Docs configuration -------------------------------------------

logo: "/assets/images/logo.svg"
favicon_ico: "/favicon.ico"

color_scheme: nerdgency

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

nav_sort: case_insensitive

aux_links:
  "Nerdgency on GitHub":
    - "https://github.com/nerdgency"

aux_links_new_tab: true

footer_content: "Copyright &copy; 2026 Nerdgency. Distributed under an <a href=\"https://github.com/nerdgency/nerdgency.github.io/blob/main/LICENSE\">MIT license</a>."

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/nerdgency/nerdgency.github.io"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

last_edit_timestamp: true
last_edit_time_format: "%b %e, %Y"

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

compress_html:
  clippings: all
  comments: all
  startings: []
  blanklines: false
  profile: false

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE

defaults:
  - scope:
      path: "formidable"
    values:
      product: formidable
